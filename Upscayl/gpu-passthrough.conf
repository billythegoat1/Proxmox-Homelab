# GPU passthrough config for an unprivileged Proxmox LXC container
#
# Append these lines to /etc/pve/lxc/<CTID>.conf
#
# Replace <render-gid> and <video-gid> with the actual GIDs from the
# Proxmox host, found via:
#   getent group render
#   getent group video
#
# Replace renderD128 with the correct render node if different
# (check with `ls -l /dev/dri` on the host).

dev0: /dev/dri/renderD128,gid=<render-gid>
dev1: /dev/dri/card0,gid=<video-gid>

# After editing, apply with a full stop/start (not a reboot from inside):
#   pct stop <CTID>
#   pct start <CTID>
#
# Verify inside the container:
#   ls -l /dev/dri
